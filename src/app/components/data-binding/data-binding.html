<div class="row">
  <div class="col-6 bg-primary">
    <h1>One way Binding </h1>
  </div>
  <div class="col-6 bg-warning">
    <h1>Two way Binding </h1>
  </div>
</div>

<div class="row">
  <div class="col-6">
    <div class="row">
      <div class="col-6">
        <p> from .ts to html</p>
        <ul>
          <li>Interpolation</li>
          <li>Property Binding</li>
        </ul>
      </div>
      <div class="col-6">
        <p> from html to .ts</p>
        <ul>
          <li>Event Binding</li>
        </ul>
      </div>
    </div>
  </div>
  <div class="col-6">
    <p></p>
    <ul>
      <li>Using ngModel Directive </li>
    </ul>
  </div>
</div>
<br>
<hr>
<div class="row">
  <div class="col-2">
    <p>{{courseName}}</p>
  </div>
  <div class="col-2">
    <span>{{courseName}}</span>
  </div>
  <div class="col-2">
    <span>{{courseDuration}}</span>
  </div>
  <div class="col-2">
    <input type="text" value="{{courseName}}" name id>
  </div>
  <div class="col-2">
    <input type="{{myInputType}}" name id>
  </div>
  <div class="{{myClassName}}">
    <input type="{{myInputType}}" name id>
  </div>
</div>
<br>
<hr>
<div class="row">
  <div class="col-4">
    <input [type]="myInputType">
  </div>
  <div class="col-4">
    <input type="text" name id [minLength]="minChar"
      [maxLength]="maxCharAllowed">
  </div>
  <div [class]="myClassName">
    <textarea name id [rows]="minChar"></textarea>
  </div>
  <div class="col-2">
    <input type="text" [value]="courseName">
  </div>
</div>
<br>
<hr>
<div class="row">
  <div class="col-2">
    <button class="btn btn-primary" onclick="showWelcomeText()">Show
      Alert</button>
  </div>
  <div class="col-2">
    <input type="text" [(ngModel)]="courseName">
  </div>
  <div class="col-2">
    <button (click)="changeCourseName('Java')"
      class="btn btn-warning mx-2">Java</button>
    <button (click)="changeCourseName('Python')"
      class="btn btn-warning mx-2">Python</button>
    <button (click)="changeCourseName('NodeJS')"
      class="btn btn-warning mx-2">NodeJS</button>
    <button (click)="changeCourseName('ReactJS')"
      class="btn btn-warning mx-2">ReactJS</button>
    <button (click)="changeCourseName('.Net')"
      class="btn btn-warning mx-2">.Net</button>
  </div>
  <div class="col-2">
    <select (change)="onCityChanged()" [(ngModel)]="selectedCity" name id>
      <option value="Pune">Pune</option>
      <option value="Mumbai">Mumbai</option>
      <option value="Gujrat">Gujrat</option>
      <option value="Delhi">Delhi</option>
    </select>
  </div>
  <div class="col-2">
    selectedCity: {{selectedCity}}
  </div>
  <div class="col-2">
    isActive => {{isActive}}
    <input type="checkbox" [(ngModel)]="isActive" name id>
  </div>

</div>
